{% extends "base.html" %}
{% block title %}— 회원가입{% endblock %}

{% block content %}
<div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
</div>

<h2>회원가입</h2>
<p class="desc">이메일과 비밀번호를 설정하세요.</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/register">
    <div class="form-group">
        <label>이메일</label>
        <input type="email" name="email" placeholder="example@email.com" autofocus>
    </div>
    <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="8자 이상">
    </div>
    <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" name="password_confirm" placeholder="비밀번호 재입력">
    </div>
    <button type="submit" class="btn">가입하기</button>
</form>
{% endblock %}
